<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 도감</title>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:scroll;
      background-color: rgb(34, 34, 34);
}

.hero{
    position:relative;
    height:100vh;
}

.top-menu{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:50px;
    z-index:10;
}


.logo img{
    height:90px;
    width:auto;
}

.top-menu a{
    color:white;
    text-decoration:none;
    font-size:24px;
    font-weight:bold;
    text-shadow:0 0 10px rgba(0,0,0,0.8);
    transition:0.3s;
}

.top-menu a:hover{
    color:gold;
    transform:scale(1.05);
}

.panel-WAW{
    position:fixed;
    top:0;
    left:0;
    width:20%;
    height:100vh;
    background:black;
    border-right:3px solid red;
    z-index:1;
}

.encyclopedia-UI img{
    position:fixed;
    top: 0px;
    left: 0px;
    width: 19.9%;
    z-index: 2;
}

.panel-WAW img{
    position:fixed;
    top: 370px;
    left: 20px;
    width: 15%;
}

.content-area{
    margin-left:20%;
    padding-top:150px;

    display:flex;
    justify-content:center;
    gap:40px;
}

.card{
    text-align:center;
    color:white;
}

.card img{
    width:250px;
    border-radius:10px;
    transition:0.3s;
}

.card img:hover{
    transform:scale(1.05);
}

.card p{
    margin-top:15px;
    font-size:14px;
}

</style>
</head>
<body>

<div class="top-menu">

    <a href="../홈페이지 index.html" class="logo">
        <img src="../이미지/logo.png" alt="게임 로고">
    </a>

    <a href="introduce.html">소개</a>
    <a href="encyclopedia.html">도감</a>
    <a href="story.html">스토리</a>

</div>

<div class="panel-WAW img">
    
    <img src="../이미지/WAW.png" alt="패널 바브">
</div>

<div class="encyclopedia-UI">
    
    <img src="../이미지/도감UI.png" alt="도감 패널">
</div>

<div class="content-area">

    <div class="card">
        <img src="../이미지/절망의기사.png" alt="WAW1">
        <p>남은 건 닳디 닳은 기사라는 볼품없는 긍지 하나 뿐이다.</p>
    </div>

    <div class="card">
        <img src="../이미지/탐욕의왕.png" alt="WAW2">
        <p>"슬픔이 말한다, 사라져라, 죽어라!<br> 
             하지만 욕망은 영원하고 싶어하지.<br>
              깊고도 깊은 영원성을 원한다네.”</p>
    </div>

    <div class="card">
        <img src="../이미지/심판새.png" alt="WAW3">
        <p>그의 천칭은 항상 어떤 죄의 무게도 소홀히 여기지 않았다.</p>
    </div>

</div>

</body>
</html>
