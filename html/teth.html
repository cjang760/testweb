<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETH 도감</title>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:scroll;
      background-color: rgb(34, 34, 34);
}

.hero{
    position:relative;
    height:100vh;
}

.top-menu{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:50px;
    z-index:10;
}


.logo img{
    height:90px;
    width:auto;
}

.top-menu a{
    color:white;
    text-decoration:none;
    font-size:24px;
    font-weight:bold;
    text-shadow:0 0 10px rgba(0,0,0,0.8);
    transition:0.3s;
}

.top-menu a:hover{
    color:gold;
    transform:scale(1.05);
}

.panel-TETH{
    position:fixed;
    top:0;
    left:0;
    width:20%;
    height:100vh;
    background:black;
    border-right:3px solid red;
    z-index:1;
}

.encyclopedia-UI img{
    position:fixed;
    top: 0px;
    left: 0px;
    width: 19.9%;
    z-index: 2;
}

.panel-TETH img{
    position:fixed;
    top: 370px;
    left: 20px;
    width: 15%;
}

.content-area{
    margin-left:20%;
    padding-top:150px;

    display:flex;
    justify-content:center;
    gap:40px;
}

.card{
    text-align:center;
    color:white;
}

.card img{
    width:250px;
    border-radius:10px;
    transition:0.3s;
}

.card img:hover{
    transform:scale(1.05);
}

.card p{
    margin-top:15px;
    font-size:14px;
}

</style>
</head>
<body>


<div class="top-menu">

    <a href="../index.html" class="logo">
        <img src="../이미지/logo.png" alt="게임 로고">
    </a>

    <a href="introduce.html">소개</a>
    <a href="encyclopedia.html">도감</a>
    <a href="story.html">스토리</a>

</div>

<div class="panel-TETH img">
    
    <img src="../이미지/TETH.png" alt="패널 테스">
</div>

<div class="encyclopedia-UI">
    
    <img src="../이미지/도감UI.png" alt="도감 패널">
</div>

<div class="content-area">

    <div class="card">
        <img src="../이미지/여인.png" alt="TETH1">
        <p>생전 그렇게 이야기가 많은 사람이었지만, <br>
             끝내 죽을 때만큼은 고독함만이 유일한 청자였다.</p>
    </div>

    <div class="card">
        <img src="../이미지/벽.png" alt="TETH2">
        <p>견딜 수 없었던 서러움은 오랜 시간 끝에 망집이 되어 무성한 머리카락으로 덮혀나갔다.</p>
    </div>

    <div class="card">
        <img src="../이미지/성냥팔이 소녀.png" alt="TETH3">
        <p>너에게 간다. 곧 나처럼 잿더미가 되어 버릴 너에게로.</p>
    </div>

</div>

</body>
</html>
