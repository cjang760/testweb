<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAYIN 도감</title>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:scroll;
      background-color: rgb(34, 34, 34);
}

.hero{
    position:relative;
    height:100vh;
}

.top-menu{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:50px;
    z-index:10;
}


.logo img{
    height:90px;
    width:auto;
}

.top-menu a{
    color:white;
    text-decoration:none;
    font-size:24px;
    font-weight:bold;
    text-shadow:0 0 10px rgba(0,0,0,0.8);
    transition:0.3s;
}

.top-menu a:hover{
    color:gold;
    transform:scale(1.05);
}

.panel-zayin{
    position:fixed;
    top:0;
    left:0;
    width:20%;
    height:100vh;
    background:black;
    border-right:3px solid red;
    z-index:1;
}

.encyclopedia-UI img{
    position:fixed;
    top: 0px;
    left: 0px;
    width: 19.9%;
    z-index: 2;
}

.panel-zayin img{
    position:fixed;
    top: 370px;
    left: 20px;
    width: 15%;
}

.content-area{
    margin-left:20%; 
    padding-top:150px;

    display:flex;
    justify-content:center;
    gap:40px;
}

.card{
    text-align:center;
    color:white;
}

.card img{
    width:250px;
    border-radius:10px;
    transition:0.3s;
}

.card img:hover{
    transform:scale(1.05);
}

.card p{
    margin-top:15px;
    font-size:14px;
}

</style>
</head>
<body>


<div class="top-menu">

    <a href="../index.html" class="logo">
        <img src="../이미지/logo.png" alt="게임 로고">
    </a>

    <a href="introduce.html">소개</a>
    <a href="encyclopedia.html">도감</a>
    <a href="story.html">스토리</a>

</div>

<div class="panel-zayin img">
    
    <img src="../이미지/ZAYIN.png" alt="패널 자인">
</div>

<div class="encyclopedia-UI">
    
    <img src="../이미지/도감UI.png" alt="도감 패널">
</div>

<div class="content-area">

    <div class="card">
        <img src="../이미지/단악수선.png" alt="ZAYIN1">
        <p>그것은 사람의 대화를 통해 드러날 수 있는 '악'을 먹는다.</p>
    </div>

    <div class="card">
        <img src="../이미지/요정.png" alt="ZAYIN2">
        <p>요정들의 보살핌을 받는 동안은 모든 것이 평화로워진다.</p>
    </div>

    <div class="card">
        <img src="../이미지/대머리.png" alt="ZAYIN3">
        <p>당신은 바리깡의 전원을 켜기 시작했다..</p>
    </div>

</div>

</body>
</html>
